server {
    listen 80 default_server;

    client_max_body_size 100M;
    charset utf-8;

    # --- Compression (QA Issue 3: no gzip/brotli on JS/CSS) ---
    # Compress text-based assets on the fly. gzip is built into nginx:1.23-alpine;
    # brotli is intentionally NOT used (it would require a custom module build).
    # `gzip_proxied any` is required because this server sits behind the
    # taiga-docker gateway, which reverse-proxies `location /` to here: without it,
    # a proxied request could suppress compression and the browser would receive
    # uncompressed bytes.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        application/javascript
        text/javascript
        application/x-javascript
        text/css
        application/json
        application/manifest+json
        image/svg+xml
        text/plain
        text/xml
        application/xml
        application/xml+rss
        font/ttf
        application/x-font-ttf;

    # --- Long-lived immutable caching for content-versioned assets (QA Issue 6) ---
    # Everything under /v-<build-timestamp>/ is fingerprinted by the build: the path
    # changes on every deploy, so these files never change under a given URL and can
    # be cached for a year. A regex location is matched ahead of the `location /`
    # prefix below; `root` (not `alias`) maps the full URI onto the html root.
    location ~ ^/v- {
        root /usr/share/nginx/html;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ index.html =404;

        # index.html / conf.json (and SPA fallbacks) must always be revalidated so
        # that a new deploy's fresh /v-<ts>/ asset paths are picked up immediately.
        add_header Cache-Control "no-cache";
    }
}
