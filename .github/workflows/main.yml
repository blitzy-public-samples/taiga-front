# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the action will run. Triggers the workflow on push or pull request events
on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ '*' ]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  linters:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Set node version
    strategy:
      matrix:
        node-version: [16.19.1]

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
    # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
    - name: Checkout
      uses: actions/checkout@v2
      with:
        persist-credentials: false

    # https://github.com/actions/setup-node/issues/214 workaround npm i by url
    - name: Reconfigure git to use HTTP authentication
      run: >
        git config --global url."https://github.com/".insteadOf
        ssh://git@github.com/

    - name: Cache node modules
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Node ${{ matrix.node-version }}
      uses: actions/setup-node@v1
      with:
        node-version: ${{ matrix.node-version }}

    - name: npm install
      run: npm ci

    - name: pass linters
      run: npm run scss-lint

  unit-test:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Set node version
    strategy:
      matrix:
        node-version: [16.19.1]

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
    # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
    - name: Checkout
      uses: actions/checkout@v2
      with:
        persist-credentials: false

    # https://github.com/actions/setup-node/issues/214 workaround npm i by url
    - name: Reconfigure git to use HTTP authentication
      run: >
        git config --global url."https://github.com/".insteadOf
        ssh://git@github.com/

    - name: Cache node modules
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Node ${{ matrix.node-version }}
      uses: actions/setup-node@v1
      with:
        node-version: ${{ matrix.node-version }}

    - name: npm install
      run: npm ci

    # [N-07] `ci:test` (package.json) already ends with `npx jest --coverage`,
    # which enforces the ≥70% line gate via `coverageThreshold` in jest.config.js
    # (AAP §0.5.2 mandates the coverage-gated Jest run live inside `ci:test`). A
    # separate `npm run test:coverage` step here re-ran the entire Jest suite with
    # coverage a second time for no added signal — removed to keep exactly one
    # coverage-gated run.
    - name: pass unit test (karma + jest coverage gate)
      run: npm run ci:test
