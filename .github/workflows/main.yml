# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the action will run. Triggers the workflow on push or pull request events
on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ '*' ]

# Dependency-security controls enforced in CI (findings M13 / C1).
#
# The Node 16.19.1 runtime pin (.nvmrc) blocks upgrading @playwright/test past
# the 1.44.x line (1.45 drops Node 16), so the accepted mitigation for the
# Playwright browser-driver advisory is to NOT download Playwright's bundled
# browsers and to drive the parity suite with the TRUSTED pre-installed Google
# Chrome (`channel: "chrome"` in playwright.config.ts). This control lives HERE
# (workflow env), not in a repo-root .npmrc: keeping it in CI removes the
# unauthorized `.npmrc` file (C1) while still guaranteeing the skip in every
# automated `npm ci` (M13). `PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD` is Playwright's
# canonical env switch (read by playwright-core's getFromENV). The Docker
# build-from-source image applies the same guarantee via `npm ci --ignore-scripts`.
env:
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  linters:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Set node version
    strategy:
      matrix:
        node-version: [16.19.1]

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
    # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
    - name: Checkout
      uses: actions/checkout@v2
      with:
        persist-credentials: false

    # https://github.com/actions/setup-node/issues/214 workaround npm i by url
    - name: Reconfigure git to use HTTP authentication
      run: >
        git config --global url."https://github.com/".insteadOf
        ssh://git@github.com/

    - name: Cache node modules
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Node ${{ matrix.node-version }}
      uses: actions/setup-node@v1
      with:
        node-version: ${{ matrix.node-version }}

    - name: npm install
      run: npm ci

    - name: pass linters
      run: npm run scss-lint

  unit-test:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Set node version
    strategy:
      matrix:
        node-version: [16.19.1]

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
    # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
    - name: Checkout
      uses: actions/checkout@v2
      with:
        persist-credentials: false

    # https://github.com/actions/setup-node/issues/214 workaround npm i by url
    - name: Reconfigure git to use HTTP authentication
      run: >
        git config --global url."https://github.com/".insteadOf
        ssh://git@github.com/

    - name: Cache node modules
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Node ${{ matrix.node-version }}
      uses: actions/setup-node@v1
      with:
        node-version: ${{ matrix.node-version }}

    - name: npm install
      run: npm ci

    - name: pass unit test
      run: npm run ci:test

  react-unit-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [16.19.1]

    steps:
    - name: Checkout
      uses: actions/checkout@v2
      with:
        persist-credentials: false

    - name: Reconfigure git to use HTTP authentication
      run: >
        git config --global url."https://github.com/".insteadOf
        ssh://git@github.com/

    - name: Cache node modules
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Node ${{ matrix.node-version }}
      uses: actions/setup-node@v1
      with:
        node-version: ${{ matrix.node-version }}

    - name: npm install
      run: npm ci

    # Finding M28 (CI acceptance): typecheck the React sources under the exact
    # Node-16-compatible toolchain before the unit gate so a type regression
    # fails CI rather than surfacing only at bundle time.
    - name: typecheck react (tsc --noEmit)
      run: npx tsc --noEmit

    # `test:react` runs Jest with collectCoverage + the HARD >=70% line-coverage
    # threshold (jest.config.js), so coverage is enforced by this step.
    - name: pass react unit tests
      run: npm run test:react

    # Finding M28 + M23 (production-bundle gate): build the served React bundle
    # with the real Gulp esbuild task and FAIL CI if it is not a production
    # build. `react.development` must be absent (the `define`d NODE_ENV selects
    # React's production internals and removes the dev-mode console warning).
    - name: build production React bundle (gulp esbuild task)
      run: npx gulp react-screens
    - name: assert production React bundle (M23 — no dev React, minified)
      run: |
        BUNDLE="$(ls dist/*/js/react-screens.js | head -1)"
        test -n "$BUNDLE" || { echo "react-screens.js was not produced"; exit 1; }
        if grep -q "react.development" "$BUNDLE"; then
          echo "FAIL: development React present in the served bundle"; exit 1;
        fi
        echo "Production React bundle OK: $BUNDLE ($(wc -c < "$BUNDLE") bytes)"

    # Finding M28 + M25/M27 (E2E / visual acceptance — static gate). The LIVE
    # Playwright parity + strict-visual run requires the full Taiga stack served
    # at http://localhost:9000, which is stood up from the SIBLING `taiga-docker`
    # submodule in the SUPERPROJECT — not from this `taiga-front` repo, so it is
    # out of reach of this workflow's checkout (AAP §0.2.1 scopes the in-repo CI
    # change to the Jest React gate). What CAN be enforced here WITHOUT the stack
    # is that the entire Playwright suite still COMPILES and is discoverable: the
    # ported kanban/backlog cases, the added negative / permission / rollback /
    # a11y / keyboard-DnD / attachment cases (M25), and the strict
    # `toHaveScreenshot` visual-parity gate (M27). `--list` transpiles every spec
    # + fixture and LOADS `playwright.config.ts` (an invalid
    # `expect.toHaveScreenshot` or `snapshotPathTemplate` option throws on load),
    # so this step fails CI on any spec or comparator-config regression. It needs
    # no browser (guaranteed repo-wide by PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD) and no
    # running stack.
    - name: verify Playwright parity suite compiles + collects (M25/M27)
      run: npx playwright test --list

    # STACK-DEPENDENT GATES (Docker build/start, live Playwright parity, strict
    # visual comparison) are enforced in the SUPERPROJECT CI that owns the
    # `taiga-docker` compose stack. Running them HERE would require this
    # `taiga-front` checkout to `docker compose up` a sibling submodule it does
    # not contain; per AAP §0.2.1 (in-repo CI change = the Jest React gate) the
    # live gates live where the stack lives. The MECHANISM they enforce — the
    # strict comparator, the AAP-grounded thresholds, and the frozen single spec
    # set run against both temporal builds — is committed in
    # `playwright.config.ts` + `e2e-react/**` and statically gated above.
